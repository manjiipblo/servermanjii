<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MANJII PBLOW ONLINE</title>
    <style>
        :root { --cyan: #00f2ff; --gold: #ffcc00; --bg: #01080b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .wallpaper { position: fixed; inset: 0; background-image: url('https://files.catbox.moe/p4m0x7.jpg'); background-size: cover; background-position: center; z-index: -1; filter: brightness(0.2); }
        
        /* Header */
        .header { padding: 15px; background: rgba(10, 25, 47, 0.95); border-bottom: 2px solid var(--cyan); display: flex; align-items: center; justify-content: space-between; z-index: 1000; }
        
        /* Chat Area */
        #view-chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 12px; border-radius: 15px; font-size: 14px; position: relative; animation: fadeIn 0.3s; line-height: 1.4; }
        .tag { font-weight: 900; font-size: 10px; display: block; margin-bottom: 4px; text-transform: uppercase; }
        
        .msg-admin { background: rgba(255, 204, 0, 0.1); border: 1px solid var(--gold); align-self: flex-start; }
        .msg-member { background: rgba(0, 242, 255, 0.1); border: 1px solid var(--cyan); align-self: flex-start; }
        .is-me { align-self: flex-end !important; background: var(--cyan) !important; color: #000 !important; border: none !important; }
        .is-me .tag { color: rgba(0,0,0,0.5) !important; }

        /* Gate/Login */
        #gate-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .gate-box { width: 90%; max-width: 350px; background: #0a192f; padding: 30px; border-radius: 20px; border: 1px solid var(--border); text-align: center; border: 1px solid var(--cyan); }
        .gate-input { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #333; color: white; border-radius: 10px; text-align: center; }

        /* Input & Nav */
        .input-box { padding: 15px; background: rgba(2, 12, 27, 0.95); display: flex; gap: 10px; border-top: 1px solid #112240; }
        #m-in { flex: 1; background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 25px; }
        .send-btn { background: var(--cyan); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        .bottom-nav { display: grid; grid-template-columns: repeat(4, 1fr); background: #020c1b; padding: 15px 0; border-top: 1px solid rgba(0,242,255,0.2); }
        .nav-btn { text-align: center; font-size: 10px; font-weight: bold; color: #8892b0; cursor: pointer; }
        .active { color: var(--cyan); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="wallpaper"></div>

    <div id="gate-screen">
        <div class="gate-box">
            <h2 style="color:var(--cyan); margin-bottom:20px;">MANJII PBLOW</h2>
            <input type="text" id="u-in" class="gate-input" placeholder="Nama Anda">
            <input type="password" id="p-in" class="gate-input" placeholder="Admin Key (Opsional)">
            <button onclick="doLogin()" style="width:100%; padding:12px; background:var(--cyan); border:none; border-radius:10px; font-weight:bold; cursor:pointer;">MASUK ONLINE</button>
        </div>
    </div>

    <div class="header">
        <b style="color:var(--cyan);">MANJII PBLOW</b>
        <div id="u-display" style="font-size:11px; border:1px solid var(--cyan); padding:4px 10px; border-radius:20px;">Guest</div>
    </div>

    <div id="view-chat"></div>

    <div class="input-box">
        <input type="text" id="m-in" placeholder="Ketik pesan..." onkeypress="if(event.key==='Enter')sendMessage()">
        <button onclick="sendMessage()" class="send-btn">➤</button>
    </div>

    <div class="bottom-nav">
        <div class="nav-btn active">CHAT</div>
        <div class="nav-btn">TESTI</div>
        <div class="nav-btn">PROFILE</div>
        <div class="nav-btn" onclick="window.open('https://manjiimarket.com')">WEB</div>
    </div>

    <script>
        // Database Demo Public
        const DB_ENDPOINT = "https://manjii-pblow-default-rtdb.firebaseio.com/chat.json";
        
        let myName = "";
        let myRole = "member";

        function doLogin() {
            let nameInput = document.getElementById('u-in').value.trim();
            let passInput = document.getElementById('p-in').value;
            
            if(!nameInput) return alert("Isi nama dulu Boss!");
            
            myName = nameInput;
            if(passInput === "MANJII777") myRole = "admin";
            
            document.getElementById('u-display').innerText = (myRole === 'admin' ? "👑 " : "") + myName;
            document.getElementById('gate-screen').style.display = 'none';
            
            // Start Load & Sync
            loadMessages();
            setInterval(loadMessages, 3000); 
        }

        async function sendMessage() {
            const input = document.getElementById('m-in');
            const text = input.value.trim();
            if(!text || !myName) return;

            const msgData = {
                user: myName,
                role: myRole,
                text: text,
                time: Date.now()
            };

            input.value = ""; // Langsung kosongkan biar fast-feel

            try {
                await fetch(DB_ENDPOINT, {
                    method: 'POST',
                    body: JSON.stringify(msgData)
                });
                loadMessages();
            } catch (e) {
                console.error("Gagal kirim:", e);
                alert("Gagal kirim pesan. Periksa koneksi!");
            }
        }

        async function loadMessages() {
            try {
                const res = await fetch(DB_ENDPOINT);
                const data = await res.json();
                const box = document.getElementById('view-chat');
                
                if(!data) {
                    box.innerHTML = '<div style="text-align:center; color:#555; font-size:12px; margin-top:50px;">Belum ada pesan...</div>';
                    return;
                }

                let html = "";
                // Urutkan berdasarkan waktu
                const sorted = Object.values(data).sort((a, b) => a.time - b.time);
                
                sorted.slice(-50).forEach(m => {
                    const isMe = (m.user === myName) ? "is-me" : "";
                    const style = (m.role === 'admin') ? "msg-admin" : "msg-member";
                    const badge = (m.role === 'admin') ? "👑 " : "👤 ";
                    
                    // Cek agar tidak muncul 'undefined'
                    if(m.user && m.text) {
                        html += `
                            <div class="msg ${style} ${isMe}">
                                <span class="tag">${badge}${m.user}</span>
                                ${m.text}
                            </div>
                        `;
                    }
                });

                box.innerHTML = html;
                box.scrollTop = box.scrollHeight;
            } catch (e) {
                console.error("Gagal muat pesan:", e);
            }
        }
    </script>
</body>
</html>
