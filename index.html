<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MANJII PBLOW ONLINE</title>
    <style>
        :root { --cyan: #00f2ff; --gold: #ffcc00; --bg: #01080b; --dark: #0a192f; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .wallpaper { position: fixed; inset: 0; background-image: url('https://files.catbox.moe/p4m0x7.jpg'); background-size: cover; background-position: center; z-index: -1; filter: brightness(0.2); }
        
        /* Navigasi Tab */
        .view-container { flex: 1; overflow-y: auto; padding: 20px; display: none; flex-direction: column; }
        .active-view { display: flex; }

        /* Header */
        .header { padding: 15px; background: rgba(10, 25, 47, 0.95); border-bottom: 2px solid var(--cyan); display: flex; align-items: center; justify-content: space-between; }
        
        /* Chat Style */
        .msg { max-width: 85%; padding: 12px; border-radius: 15px; font-size: 14px; margin-bottom: 12px; line-height: 1.4; animation: fadeIn 0.3s; }
        .tag { font-weight: 900; font-size: 10px; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .msg-admin { background: rgba(255, 204, 0, 0.1); border: 1px solid var(--gold); align-self: flex-start; }
        .msg-member { background: rgba(0, 242, 255, 0.1); border: 1px solid var(--cyan); align-self: flex-start; }
        .is-me { align-self: flex-end !important; background: var(--cyan) !important; color: #000 !important; border: none !important; }

        /* Testi & Profile Card */
        .card { background: var(--dark); border: 1px solid var(--cyan); padding: 15px; border-radius: 12px; margin-bottom: 10px; }

        /* Gate/Login */
        #gate-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .gate-box { width: 90%; max-width: 350px; background: var(--dark); padding: 30px; border-radius: 20px; border: 1px solid var(--cyan); text-align: center; }
        .gate-input { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #333; color: white; border-radius: 10px; text-align: center; }

        /* Footer */
        .input-box { padding: 15px; background: rgba(2, 12, 27, 0.95); display: flex; gap: 10px; }
        #m-in { flex: 1; background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 25px; }
        .bottom-nav { display: grid; grid-template-columns: repeat(4, 1fr); background: #020c1b; padding: 15px 0; border-top: 1px solid rgba(0,242,255,0.2); }
        .nav-btn { text-align: center; font-size: 10px; font-weight: bold; color: #8892b0; cursor: pointer; }
        .nav-btn.active { color: var(--cyan); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="wallpaper"></div>

    <div id="gate-screen">
        <div class="gate-box">
            <h2 style="color:var(--cyan);">MANJII PBLOW</h2>
            <input type="text" id="u-in" class="gate-input" placeholder="Nama Anda">
            <input type="password" id="p-in" class="gate-input" placeholder="Admin Key (Optional)">
            <button onclick="doLogin()" style="width:100%; padding:12px; background:var(--cyan); border:none; border-radius:10px; font-weight:bold; cursor:pointer;">MASUK</button>
        </div>
    </div>

    <div class="header">
        <b style="color:var(--cyan);">MANJII PBLOW</b>
        <div id="u-display" style="font-size:11px; border:1px solid var(--cyan); padding:4px 10px; border-radius:20px;">Online</div>
    </div>

    <div id="tab-chat" class="view-container active-view"></div>

    <div id="tab-testi" class="view-container">
        <h3 style="color:var(--cyan);">RIWAYAT TESTIMONI</h3>
        <div id="list-testi">
            </div>
    </div>

    <div id="tab-profile" class="view-container">
        <div class="card" style="text-align:center; padding:40px 20px;">
            <div id="p-ava" style="width:80px; height:80px; background:var(--cyan); border-radius:50%; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; color:#000; font-size:30px; font-weight:bold;">?</div>
            <h2 id="p-name" style="margin:5px 0; color:var(--cyan);">USER</h2>
            <p id="p-role" style="color:var(--gold);">MEMBER</p>
            <hr style="border:0; border-top:1px solid #112240; margin:20px 0;">
            <p style="font-size:12px; color:#8892b0;">Status Akun: Aktif & Terverifikasi</p>
        </div>
    </div>

    <div id="input-area" class="input-box">
        <input type="text" id="m-in" placeholder="Ketik pesan..." onkeypress="if(event.key==='Enter')sendMessage()">
        <button onclick="sendMessage()" style="background:var(--cyan); border:none; width:45px; height:45px; border-radius:50%; cursor:pointer;">➤</button>
    </div>

    <div class="bottom-nav">
        <div class="nav-btn active" onclick="switchTab('chat', this)">CHAT</div>
        <div class="nav-btn" onclick="switchTab('testi', this)">TESTI</div>
        <div class="nav-btn" onclick="switchTab('profile', this)">PROFILE</div>
        <div class="nav-btn" onclick="window.open('https://manjiimarket.com')">WEB</div>
    </div>

    <script>
        // Gunakan URL yang sudah pasti aktif JSON-nya
        const DB = "https://manjii-pblow-default-rtdb.firebaseio.com/chat.json";
        let myName = "";
        let myRole = "member";

        function doLogin() {
            let u = document.getElementById('u-in').value.trim();
            let p = document.getElementById('p-in').value;
            if(!u) return alert("Isi Nama!");
            myName = u;
            if(p === "MANJII777") myRole = "admin";
            
            document.getElementById('u-display').innerText = (myRole === 'admin' ? "👑 " : "") + myName;
            document.getElementById('p-name').innerText = myName.toUpperCase();
            document.getElementById('p-role').innerText = myRole === 'admin' ? "ADMIN / OWNER" : "MEMBER PREMIUM";
            document.getElementById('p-ava').innerText = myName[0].toUpperCase();
            
            document.getElementById('gate-screen').style.display = 'none';
            loadMsgs();
            setInterval(loadMsgs, 3000);
            generateTesti();
        }

        function switchTab(tab, el) {
            document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active-view'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active-view');
            el.classList.add('active');
            
            // Sembunyikan input box kalau bukan di tab chat
            document.getElementById('input-area').style.display = (tab === 'chat') ? 'flex' : 'none';
        }

        async function sendMessage() {
            let input = document.getElementById('m-in');
            let txt = input.value.trim();
            if(!txt) return;

            let msgData = { user: myName, role: myRole, text: txt, time: Date.now() };
            input.value = "Sending...";

            try {
                // Gunakan POST untuk mengirim data baru ke Firebase
                const response = await fetch(DB, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(msgData)
                });
                
                if(response.ok) {
                    input.value = "";
                    loadMsgs();
                } else {
                    throw new Error();
                }
            } catch(e) { 
                alert("Gagal kirim! Pastikan koneksi stabil.");
                input.value = txt;
            }
        }

        async function loadMsgs() {
            try {
                let res = await fetch(DB);
                let data = await res.json();
                let box = document.getElementById('tab-chat');
                if(!data) return;

                let html = "";
                let sorted = Object.values(data).sort((a,b) => a.time - b.time);
                sorted.slice(-50).forEach(m => {
                    if(m.user && m.text) {
                        let isMe = (m.user === myName) ? "is-me" : "";
                        let style = (m.role === 'admin') ? "msg-admin" : "msg-member";
                        html += `<div class="msg ${style} ${isMe}"><span class="tag">${m.role==='admin'?'👑':'👤'} ${m.user}</span>${m.text}</div>`;
                    }
                });
                box.innerHTML = html;
                box.scrollTop = box.scrollHeight;
            } catch(e) {}
        }

        function generateTesti() {
            const list = document.getElementById('list-testi');
            const names = ["Andi", "Siska", "Budi", "Rian", "Dewi"];
            const items = ["90 Diamonds", "Weekly Pass", "Skins", "Member VIP"];
            
            setInterval(() => {
                const n = names[Math.floor(Math.random()*names.length)];
                const i = items[Math.floor(Math.random()*items.length)];
                const div = document.createElement('div');
                div.className = "card";
                div.innerHTML = `<b style="color:var(--cyan)">${n}</b> baru saja membeli <b>${i}</b> <br> <small style="color:#555">Baru saja</small>`;
                list.prepend(div);
            }, 10000);
        }
    </script>
</body>
</html>
